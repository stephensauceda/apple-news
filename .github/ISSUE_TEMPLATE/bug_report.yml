name: Bug report
description: Report a reproducible problem
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for opening a bug report.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-line description of the bug
      placeholder: readArticle throws for valid article id
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact commands, code snippets, and inputs
      placeholder: |
        1. Configure client with ...
        2. Call ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node version
      placeholder: 24.8.0
    validations:
      required: true

  - type: input
    id: package
    attributes:
      label: Package version
      placeholder: 0.1.0
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or stack traces
      render: shell
